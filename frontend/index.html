<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="app">
      <header class="header">
        <div class="header-top">
          <h1>Todo</h1>
          <button id="theme-toggle" class="theme-toggle" title="切换主题">🌙</button>
        </div>
        <p class="subtitle">连接后端 API · 127.0.0.1:3000</p>
        <div class="stats">
          <span>总任务 <strong id="stat-total">0</strong></span>
          <span class="stat-sep">·</span>
          <span>未完成 <strong id="stat-active">0</strong></span>
          <span class="stat-sep">·</span>
          <span>已完成 <strong id="stat-completed">0</strong></span>
        </div>
      </header>

      <div class="composer">
        <input id="todo-input" type="text" placeholder="输入待办内容，按 Enter 添加…" maxlength="200" />
        <button id="add-todo" type="button">添加</button>
      </div>

      <div class="priority-group" id="priority-group">
        <span class="priority-option" data-priority="1">高</span>
        <span class="priority-option selected" data-priority="2">中</span>
        <span class="priority-option" data-priority="3">低</span>
      </div>

      <div class="due-date-field">
        <label class="field-label" for="todo-due-date">截止日期</label>
        <input type="text" id="todo-due-date" class="due-date-input" placeholder="YYYY-MM-DD" maxlength="10" />
      </div>

      <div class="toolbar">
        <input id="search-input" type="text" class="search-input" placeholder="搜索任务..." />
        <div class="filter-group" id="filter-group">
          <span class="filter-btn active" data-filter="all">全部</span>
          <span class="filter-btn" data-filter="active">未完成</span>
          <span class="filter-btn" data-filter="completed">已完成</span>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>我的待办</h2>
          <span id="todo-count" class="badge">0</span>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
        <ul id="todo-list" class="todo-list"></ul>
        <p id="empty-state" class="empty-state hidden">暂无任务</p>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
