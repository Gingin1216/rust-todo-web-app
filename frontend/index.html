<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="app">
      <header class="header">
        <h1>Todo</h1>
        <p class="subtitle">连接后端 API · 127.0.0.1:3000</p>
      </header>

      <form id="add-form" class="composer" autocomplete="off">
        <input
          id="title-input"
          type="text"
          placeholder="输入待办内容，按 Enter 添加…"
          maxlength="200"
          required
        />
        <button type="submit">添加</button>
      </form>
      <div class="priority-group" id="priority-group">
        <span class="priority-option" data-priority="1">高</span>
        <span class="priority-option selected" data-priority="2">中</span>
        <span class="priority-option" data-priority="3">低</span>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>我的待办</h2>
          <span id="todo-count" class="badge">0</span>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
        <ul id="todo-list" class="todo-list"></ul>
        <p id="empty-state" class="empty-state hidden">暂无任务</p>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
